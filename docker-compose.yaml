version: "3.7"
services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: docker_db
    ports:
      - "5434:5432"
  backend:
    build: .
    ports:
      - 4001:3000
    restart: always
    depends_on:
      - postgres
